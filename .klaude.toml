[default]
model = "mlx-community/Qwen3-Coder-30B-A3B-Instruct-8bit"
base_url = "http://localhost:8080/v1"

# GitHub — PR management, issues, code search (official Go binary)
[mcp.servers.github]
command = "/Users/nam/.local/bin/github-mcp-server"
args = [
    "stdio",
    "--toolsets", "repos,pull_requests",
    "--exclude-tools", "fork_repository,create_repository,delete_file,get_label,get_latest_release,get_release_by_tag,get_tag,list_releases,list_tags,search_repositories,search_code,add_reply_to_pull_request_comment,add_comment_to_pending_review,pull_request_review_write,sub_issue_write,list_issue_types,update_pull_request_branch",
]
env = { GITHUB_PERSONAL_ACCESS_TOKEN = "env:GITHUB_PERSONAL_ACCESS_TOKEN", GITHUB_TOOLSETS = "repos,pull_requests" }
