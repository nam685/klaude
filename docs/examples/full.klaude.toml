# Full configuration — all options demonstrated

[default]
model = "qwen3-coder-30b-a3b"
base_url = "http://localhost:8080/v1"
api_key = "not-needed"
context_window = 32768
max_tokens = 0                      # 0 = unlimited
auto_approve = false                # true to skip permission prompts
undo_depth = 10                     # number of undo snapshots to keep

# Model profiles — switch with uv run klaude --profile <name>
[profiles.remote]
model = "gpt-4o"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
context_window = 128000

# Hooks — shell commands around tool execution
# Placeholders: {tool_name}, {arguments}
[hooks]
pre_tool = ""
post_tool = ""
# Example: log every tool call
# pre_tool = "echo '{tool_name}: {arguments}' >> /tmp/klaude-tools.log"

# Plugin directories
[plugins]
tools_dir = ".klaude/tools"         # custom Python tool plugins
skills_dir = ".klaude/skills"       # custom skill templates (.md)

# MCP servers
[mcp.servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env = { GITHUB_TOKEN = "env:GITHUB_TOKEN" }
