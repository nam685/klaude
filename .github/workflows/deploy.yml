name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.KLAUDE_DEPLOY_HOST }}
          username: klaude
          key: ${{ secrets.KLAUDE_DEPLOY_SSH_KEY }}
          script: |
            export PATH="$HOME/.local/bin:$PATH"
            uv tool upgrade klaude
